zerops:
  - setup: docker
    run:
      base: docker@26.1
      # download and cache docker image
      prepareCommands:
        - docker image pull ghcr.io/shashwat-coding/effective-palm-tree:main@sha256:2ea3b0763fd191e7ec4fadb03b58e3cf6bd868bd4c597c738b14c7b6fb207099
      # start docker, --network=host needed
      start: docker run --network=host ghcr.io/shashwat-coding/effective-palm-tree:main@sha256:2ea3b0763fd191e7ec4fadb03b58e3cf6bd868bd4c597c738b14c7b6fb207099
      # what ports docker exposes
      # and whether it supports http traffic
      ports:
        - port: 7860
          httpSupport: true
